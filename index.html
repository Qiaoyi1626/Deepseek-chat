<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DeepSeek 智能助手</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            border-radius: 0;
            overflow: hidden;
        }
        @media (min-width: 640px) {
            .chat-container {
                height: 90vh;
                border-radius: 28px;
                margin: 20px;
            }
        }
        /* 聊天记录区域 */
        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        /* 消息气泡样式 */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .user-message {
            align-self: flex-end;
        }
        .ai-message {
            align-self: flex-start;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .user-bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .ai-bubble {
            background: #e9ecef;
            color: #1e2a3e;
            border-bottom-left-radius: 4px;
        }
        /* 打字指示器 */
        .typing-indicator {
            padding: 8px 16px;
            background: #e9ecef;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #6c757d;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1.2); opacity: 1; }
        }
        /* 输入区域 */
        .input-area {
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-box {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #dee2e6;
            border-radius: 30px;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border 0.2s;
        }
        .input-box:focus {
            border-color: #007aff;
        }
        .send-btn {
            background: #007aff;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn:active {
            background: #005fc1;
        }
        .send-btn:disabled {
            background: #b0c4de;
            cursor: not-allowed;
        }
        .error-marker {
            color: #dc2626;
            font-size: 13px;
            margin-top: 6px;
            margin-left: 16px;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-history" id="chatHistory">
        <div class="message ai-message">
            <div class="bubble ai-bubble">
                👋 你好！我是 DeepSeek 智能助手，有什么可以帮你的吗？
            </div>
        </div>
    </div>
    <div class="input-area">
        <textarea class="input-box" id="userInput" rows="1" placeholder="输入你的问题..." onkeydown="if(event.key === 'Enter' && !event.shiftKey){ event.preventDefault(); sendMessage(); }"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // 配置区 ———— 在这里替换成你自己的 API Key！！！
    const DEEPSEEK_API_KEY = 'sk-cf371492433943b1bf8a10fb58e2a9da
';
    // API 调用地址
    const API_URL = 'https://api.deepseek.com/chat/completions';
    const MODEL_NAME = 'deepseek-chat';  // 或 'deepseek-reasoner'

    const chatHistoryDiv = document.getElementById('chatHistory');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    let isLoading = false; // 防止重复发送

    // 添加消息到界面
    function addMessage(content, role) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role === 'user' ? 'user-message' : 'ai-message'}`;
        const bubble = document.createElement('div');
        bubble.className = `bubble ${role === 'user' ? 'user-bubble' : 'ai-bubble'}`;
        bubble.innerText = content;
        messageDiv.appendChild(bubble);
        chatHistoryDiv.appendChild(messageDiv);
        // 滚动到底部
        chatHistoryDiv.scrollTop = chatHistoryDiv.scrollHeight;
        return messageDiv;
    }

    // 显示 “AI 正在输入...”
    function showTypingIndicator() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message ai-message';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `<div class="typing-indicator"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
        chatHistoryDiv.appendChild(typingDiv);
        chatHistoryDiv.scrollTop = chatHistoryDiv.scrollHeight;
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    // 调用 DeepSeek API
    async function callDeepSeek(userMessage) {
        const requestBody = {
            model: MODEL_NAME,
            messages: [
                { role: "system", content: "你是 DeepSeek 助手，请用简洁、清晰且友好的方式回答用户问题。" },
                { role: "user", content: userMessage }
            ],
            stream: false,
            temperature: 0.7,
            max_tokens: 2000
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                let errorDetail = `HTTP ${response.status}`;
                try {
                    const errData = await response.json();
                    errorDetail = errData.error?.message || errorDetail;
                } catch(e) {}
                throw new Error(`API 请求失败: ${errorDetail}`);
            }

            const data = await response.json();
            if (data.choices && data.choices.length > 0) {
                return data.choices[0].message.content;
            } else {
                throw new Error('API 返回数据格式异常');
            }
        } catch (error) {
            console.error('DeepSeek API Error:', error);
            throw error;
        }
    }

    // 发送消息主流程
    async function sendMessage() {
        const userMessage = userInput.value.trim();
        if (!userMessage) return;
        if (isLoading) return;

        // 1. 显示用户消息
        addMessage(userMessage, 'user');
        userInput.value = '';
        userInput.style.height = 'auto'; // 重置高度
        // 2. 开始请求
        isLoading = true;
        sendBtn.disabled = true;
        showTypingIndicator();

        try {
            const aiReply = await callDeepSeek(userMessage);
            removeTypingIndicator();
            addMessage(aiReply, 'ai');
        } catch (err) {
            removeTypingIndicator();
            const errorMsg = `❌ 出错了: ${err.message}`;
            addMessage(errorMsg, 'ai');
            console.error(err);
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    // 自适应文本框高度
    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
</script>
</body>
</html>
